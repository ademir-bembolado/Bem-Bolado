<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bem Bolado FC</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0d0d0d;
    color:#fff;
}

.header{
    text-align:center;
    padding:20px;
}

.header img{
    width:80px;
}

.tabs{
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:10px;
}

.tab{
    color:#aaa;
}

.tab.active{
    color:#fff;
    border-bottom:2px solid #fff;
}

.content{
    padding:20px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png">
    <h1>Bem Bolado</h1>
    <p>Técnico: Dema</p>
</div>

<div class="tabs">
    <div class="tab active">Presença</div>
    <div class="tab">Campo</div>
    <div class="tab">Jogo</div>
    <div class="tab">Stats</div>
</div>

<div class="content">
    <h2>Jogadores</h2>
    <button>Montar Time</button>
</div>

</body>
</html>
